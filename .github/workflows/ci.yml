name: CI

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: [1.20, 1.21]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ${{ github.workspace }}/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-

      - name: Install dependencies
        run: go mod download

      - name: Run go fmt (check) on Unix
        if: matrix.os != 'windows-latest'
        run: |
          fmt_output=$(gofmt -l .)
          if [ -n "$fmt_output" ]; then
            echo "gofmt needs to be run on the following files:"
            echo "$fmt_output"
            exit 1
          fi
        shell: bash

      - name: Run go fmt (check) on Windows
        if: matrix.os == 'windows-latest'
        run: |
          $fmt = gofmt -l .
          if ($fmt) {
            Write-Host "gofmt needs to be run on the following files:"
            Write-Host $fmt
            exit 1
          }
        shell: pwsh

      - name: Run go vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test ./... -v
